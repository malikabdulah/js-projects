<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Guess</title>
    <style>
        body{
            text-align: center;
            background-color: #212121;
            color: #fff;
        }
    </style>
</head>
<body>
    <div>
        <h1 style="font-size: 40px;">Number Guessing Game</h1>
        <p>Try and Guess a Random Number between 1 and 100.</p>
        <p>You have 10 attempts to guess the right number</p>
    </div>
    <br />
    <div>
        <h1>MAKE A GUESS</h1>
        <form>
            <input type="text" id="answer" style="width: 100px; height: 45px; font-size: 30px; border-radius: 8px;">
            <br />
            <br />
            <button style="background-color: black; color: #fff;height: 30px; width: 80px; font-size: 18px; border-radius: 8px;">Submit</button>
        </form>
        <br />
        <br />
        <p>Guess Count: <span id="guess-count">0</span></p>
        <p>Guesses Remaining: <span id="guess-remaining">10</span></p>
        <p id="lowOrHi"></p>
    </div>
</body>
<script src="number-guess.js"></script>
</html>
