<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI Calculator</title>
    <style>
        body{
            background-color: #212121;
            color: #fff;
        }
        div{
            text-align: center;
            font-size: larger;
        }
        p{
            text-align: center;
            font-size: larger;
        }
    </style>
</head>
<body>
    <h1 style="text-align: center;">BMI Calculator</h1>
    <form>
        <p><label>Height in 'cm':</label> <input type="text" id="height" style="width: 70px;"></p>
        <p><label>Weight in 'kg':</label> <input type="text" id="weight" style="width: 70px;"></p>
        <p><button style="height: 40px; width: 110px; font-size: 20px;">Calculate</button></p>
    </form>
    <div id="result">
    </div>
    <div id="weight-guide">
        <h2>BMI Weight Guide</h2>
            <p>
                UnderWeight: Less than 18.6
                <br />
                Normal Range: 18.6 - 24.9
                <br />
                Overweight: Greater than 24.9
            </p>
    </div>
</body>
<script  src="bmi-script.js"></script>
</html>
